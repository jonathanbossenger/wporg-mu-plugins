name: Build and push to build branch.

on:
    push:
        branches: [trunk]

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

jobs:
    # Run the linting and test suites first. The build job below depends on both,
    # so a failing lint/test run prevents the build branch from being updated.
    lint:
        uses: ./.github/workflows/linters.yml
    test:
        uses: ./.github/workflows/tests.yml

    build:
        needs: [lint, test]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@2541b1294d2704b0964813337f33b291d3f8596b # v3.0.2

            - name: Install NodeJS
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: npm

            - name: Install all dependencies
              run: |
                  composer install --no-dev
                  npm ci

            - name: Build
              run: npm run build

            - name: Ignore .gitignore
              run: |
                  git add mu-plugins/blocks/*/build/* --force
                  git add vendor --force

            - name: Commit and push
              # Using a specific hash here instead of a tagged version, for risk mitigation, since this action modifies our repo.
              uses: actions-js/push@a52398fac807b0c1e5f1492c969b477c8560a0ba # 1.3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  branch: build
                  force: true
                  message: 'Build: ${{ github.sha }}'
